name: Shared and Android CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.13.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:check
      - run: pnpm test
      - run: pnpm --dir packages/wechat build
      - run: pnpm --dir packages/wechat test
      - run: pnpm docs:build
      - run: pnpm artifacts
      - run: node --test tests/release.test.mjs
      - run: sha256sum --check SHA256SUMS
        working-directory: artifacts
      - uses: actions/upload-artifact@v4
        with: { name: coolui-release-artifacts, path: artifacts/** }

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-31" "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: 9.4.1 }
      - run: gradle -p packages/android test compileDebugAndroidTestKotlin publishReleasePublicationToLocalArtifactsRepository
      - uses: actions/upload-artifact@v4
        with: { name: coolui-compose, path: packages/android/build/repo/** }
