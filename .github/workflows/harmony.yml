name: HarmonyOS CI

on:
  workflow_dispatch:
  pull_request:
    paths: ["packages/arkui/**", "apps/catalog-arkui/**", "contracts/**", "packages/tokens/**"]

permissions:
  contents: read

jobs:
  har:
    runs-on: [self-hosted, Windows, harmonyos-6, deveco]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.13.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir packages/arkui test
      - name: Verify OHPM prepublish guard
        working-directory: packages/arkui
        shell: powershell
        run: |
          if (Get-Command ohpm -ErrorAction SilentlyContinue) {
            $output = (ohpm prepublish 2>&1 | Out-String)
            if ($LASTEXITCODE -eq 0 -or $output -notmatch 'publicRegistryPublishing=false') {
              throw "OHPM prepublish did not execute the local-only guard: $output"
            }
            Write-Host "OHPM prepublish guard rejected public publishing as expected."
          } else {
            Write-Host "::notice::OHPM prepublish validation pending: ohpm is unavailable on this runner."
          }
      - name: Build HAR
        working-directory: packages/arkui
        run: hvigorw assembleHar --mode module -p product=default
      - uses: actions/upload-artifact@v4
        with: { name: coolui-arkui-har, path: packages/arkui/build/**/outputs/**/*.har }
