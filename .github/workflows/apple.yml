name: Apple CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  swiftui:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Verify Xcode 26
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26(\.|$)'
      - name: Swift test
        shell: bash
        run: |
          set +e
          swift test --package-path packages/swift 2>&1 | tee swift-test.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            summary=$(grep -E 'error:|fatal error:' swift-test.log | tail -n 8 | sed 's/%/%25/g' | tr '\n' ' ')
            if [ -z "$summary" ]; then
              summary=$(tail -n 20 swift-test.log | sed 's/%/%25/g' | tr '\n' ' ')
            fi
            echo "::error title=Swift test failed::$summary"
            exit "$status"
          fi
      - name: Verify root SwiftPM consumer
        run: swift run --package-path examples/swift-consumer
      - name: Generate Catalog project
        run: brew install xcodegen && cd apps/catalog-swift && xcodegen generate
      - name: Build iOS Catalog
        run: xcodebuild -project apps/catalog-swift/CoolUICatalog.xcodeproj -scheme CoolUICatalog -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' CODE_SIGNING_ALLOWED=NO build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-test-results
          path: |
            swift-test.log
            packages/swift/.build/**
          include-hidden-files: true
