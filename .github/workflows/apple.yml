name: Apple CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  swiftui:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Verify Xcode 26
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26(\.|$)'
      - name: Swift test
        run: swift test --package-path packages/swift
      - name: Generate Catalog project
        run: brew install xcodegen && cd apps/catalog-swift && xcodegen generate
      - name: Build iOS Catalog
        run: xcodebuild -project apps/catalog-swift/CoolUICatalog.xcodeproj -scheme CoolUICatalog -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 17 Pro' CODE_SIGNING_ALLOWED=NO build
      - uses: actions/upload-artifact@v4
        with: { name: swift-test-results, path: packages/swift/.build/** }
