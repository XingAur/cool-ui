name: CoolUICatalog
options:
  bundleIdPrefix: dev.coolui
targets:
  CoolUICatalog:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources: [CoolUICatalog]
    dependencies:
      - package: CoolUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
packages:
  CoolUI:
    path: ../../packages/swift
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: dev.coolui.catalog
